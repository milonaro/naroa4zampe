version: '3.8'

services:
  # ── Applicazione Next.js ─────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/app/db/a4zampe.db
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@a4zampe.it}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - db_data:/app/db
    ports:
      - "3000:3000"

  # ── Reverse Proxy Caddy ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # ── Backup automatico database ───────────────────────────────
  backup:
    image: oven/bun:1.3.4-alpine
    volumes:
      - db_data:/app/db
      - ./scripts/backup.sh:/backup.sh:ro
    command: >
      sh -c "apk add --no-cache sqlite dcron &&
             echo '0 2 * * * sh /backup.sh' | crontab - &&
             crond -f"
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
  caddy_config:
